    <style>
        :root {
            --formula-card-bg: var(--bg-primary);
            --formula-card-border: var(--border);
            --formula-accent-quad: #10b981;
            --formula-accent-geo: #3b82f6;
            --formula-accent-alg: #6366f1;
            --formula-badge-radius: 4px;
            --example-bg: rgba(99, 102, 241, 0.03);
            --trap-color: #ef4444;
            --shortcut-color: #10b981;
        }

        .formula-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 3.5rem;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--formula-badge-radius);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .cat-quad {
            background: rgba(16, 185, 129, 0.1);
            color: var(--formula-accent-quad);
        }

        .cat-geo {
            background: rgba(59, 130, 246, 0.1);
            color: var(--formula-accent-geo);
        }

        .cat-alg {
            background: rgba(99, 102, 241, 0.1);
            color: var(--formula-accent-alg);
        }

        .formula-display {
            font-size: 2.2rem;
            margin: 2.5rem 0;
            text-align: center;
            color: var(--text-primary);
        }

        .formula-explanation {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .example-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .example-content {
            display: none;
            padding: 2.5rem;
            background: var(--example-bg);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .step-list {
            list-style: none;
            padding: 0;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .step-list li {
            margin-bottom: 1rem;
            padding-left: 2rem;
            position: relative;
            overflow-x: auto;
            white-space: normal;
            word-wrap: break-word;
        }

        .step-list li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--text-muted);
            font-weight: bold;
        }

        .scan-table-container {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 4rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .scan-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .scan-table th {
            background: #f8fafc;
            padding: 1.25rem 1.5rem;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border);
        }

        .scan-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .scan-num {
            color: var(--text-muted);
            font-weight: 700;
            width: 40px;
        }

        .scan-name {
            font-weight: 600;
            color: var(--accent-primary);
        }

        .scan-math {
            font-family: serif;
            font-size: 1.1rem;
        }

        .scan-gift {
            background: #f0fdf4;
            color: #166534;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .step-math {
            display: block;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .formula-card {
                padding: 0.5rem !important;
            }

            .formula-display {
                font-size: 20px !important;
                /* Fixed PX size */
                overflow-x: auto;
                white-space: nowrap;
                padding: 4px 0;
            }

            .example-content {
                padding: 1rem 0.5rem;
            }

            .comparison-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .step-list {
                margin-left: 0;
            }

            .step-list li {
                padding-left: 1.2rem;
                padding-right: 0;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }

            .step-math {
                margin-left: -1.2rem;
                width: calc(100% + 1.2rem);
                text-align: center;
                padding: 0 0.25rem;
            }

            /* Force MathJax to wrap if it's too long */
            mjx-container {
                max-width: 100% !important;
                white-space: normal !important;
                word-wrap: break-word !important;
            }

            /* Specifically shrink formulas in the step list on mobile */
            .step-list mjx-container {
                font-size: 0.95em !important;
            }
        }
    </style>
</head>

<body class="content-page">
    <div class="page-bg"></div>

    <div class="page-container">
        <!-- 1. NARROW RAIL -->
        <aside class="narrow-rail" id="narrow-rail">
            <!-- JS will populate -->
        </aside>

        <!-- 3. MAIN CONTENT -->
        <main class="main-content">
            <header class="hero-section" style="padding: 4rem 5%; text-align: center;">
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; margin-bottom: 1rem;">SAT Math
                    Formulas</h1>
                <p style="font-size: 1.25rem; color: var(--text-secondary); max-width: 800px; margin: 0 auto;">
                    The 20+ SAT math formulas they don't give you. Detailed evidence of why traditional methods are too
                    slow for digital SAT math. Upgrade your SAT math practice today.
                </p>
            </header>

            <!-- FLASH CARDS FEATURE (Moved outside for full width) -->
            <link rel="stylesheet" href="flash-cards.v2.css?v=202602221715">
            <div id="flash-card-container"></div>
            <script src="formulas-data.v2.js?v=202602221715"></script>
            <script src="flash-cards.v2.js?v=202602221715"></script>
            <script src="formulas-renderer.js?v=202602262145"></script>
            <!-- END FLASH CARDS -->

            <div style="max-width: 1000px; margin: 0 auto; padding: 0 5% 5rem;">

                <!-- SDD Dynamic Container -->
                <div id="formulas-dynamic-container"></div>
            </div>
        </main>
    </div>

    <!-- Hidden Footer -->
    <footer style="display: none;"></footer>

    <script>
        // Formulas data is now loaded from formulas-data.js


        function populateTable() {
            const body = document.getElementById('scan-table-body');
            body.innerHTML = formulas.map(f => `
                <tr onclick="location.href='${f.link}'" style="cursor: pointer;">
                    <td class="scan-num">${f.id}</td>
                    <td class="scan-name">${f.name}</td>
                    <td class="scan-math">${f.math}</td>
                    <td><span class="scan-gift">${f.gift}</span></td>
                    <td><input type="checkbox" class="mastery-check" onclick="event.stopPropagation()"></td>
                </tr>
            `).join('');
        }

        function toggleExample(btn) {
            const content = btn.nextElementSibling;
            const plus = btn.querySelector('.plus');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                plus.textContent = '+';
            } else {
                content.style.display = 'block';
                plus.textContent = '-';
            }
        }

        // SAFER MOBILE FIX (PX UNITS, NO LAYOUT BREAKING)
        if (window.innerWidth <= 768) {
            const style = document.createElement('style');
            style.innerHTML = `
                @media (max-width: 768px) {
                    .formula-card {
                        padding: 8px !important; 
                        /* REMOVED width/margin hacks that broke nav */
                    }
                    .formula-display {
                        font-size: 20px !important; /* Keep px size */
                        line-height: 1.3 !important;
                        overflow-x: auto !important;
                        white-space: nowrap !important;
                        display: block !important;
                        padding: 5px 0 !important;
                    }
                }
            `;
            document.head.appendChild(style);
        }

        document.addEventListener('DOMContentLoaded', populateTable);
    </script>
    <!-- Restored State -->
</body>

</html>
